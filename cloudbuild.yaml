# Cloud Build CI/CD pipeline for AI VTuber
#
# Project-specific defaults are kept in infra/gcp.env.
# ${PROJECT_ID} is set automatically by Cloud Build to the trigger's project —
# no manual update needed when moving to a different project.
# Override _VOICEVOX_URL in the Cloud Build trigger UI.
#
# Secrets (managed in Secret Manager, not in trigger variables):
#   OPEN_AI_API_KEY  → injected as OPENAI_API_KEY
#   YOUTUBE_API_KEY  → injected as YOUTUBE_API_KEY

steps:
  # Build Docker image with layer cache
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${COMMIT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'
      - '--cache-from'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'
      - '.'

  # Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--project=${PROJECT_ID}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${COMMIT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--set-secrets=OPENAI_API_KEY=OPEN_AI_API_KEY:latest,YOUTUBE_API_KEY=YOUTUBE_API_KEY:latest'
      - '--set-env-vars=FIREBASE_PROJECT_ID=${PROJECT_ID},VOICEVOX_URL=${_VOICEVOX_URL},VOICEVOX_SPEAKER_ID=${_VOICEVOX_SPEAKER_ID}'

# Default substitutions — kept in sync with infra/gcp.env.
# Override _VOICEVOX_URL in the Cloud Build trigger after deploying VOICEVOX.
substitutions:
  _REGION: asia-northeast1      # = GCP_REGION in infra/gcp.env
  _SERVICE: aivtuber            # = GCP_MAIN_SERVICE in infra/gcp.env
  _REPO: aivtuber               # = GCP_AR_REPO in infra/gcp.env
  _VOICEVOX_URL: ''             # Set after deploying VOICEVOX (output of setup.sh)
  _VOICEVOX_SPEAKER_ID: '1'    # = VOICEVOX_SPEAKER_ID in infra/gcp.env

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${COMMIT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM
